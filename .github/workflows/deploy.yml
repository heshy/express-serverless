name: Deploy Serverless Framework App
'on':
  workflow_dispatch:
    inputs:
      stage:
        description: Select deployment stage
        required: true
        default: dev
        type: choice
        options:
          - dev
          - uat
          - prod
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: '${{ secrets.AWS_GITHUB_DEPLOY_ROLE }}'
          aws-region: us-east-1
      - name: Deploy using Serverless Framework
        run: 'npx serverless deploy --stage ${{ github.event.inputs.stage }}'
        env:
          SERVERLESS_ACCESS_KEY: '${{ secrets.SERVERLESS_ACCESS_KEY }}'
